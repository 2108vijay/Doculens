services:

  postgres:
    image: postgres:16-alpine
    container_name: doculens_v2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doculens_v2
    ports:
      - "5433:5432"
    volumes:
      - postgres_v2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doculens_network

  minio:
    image: minio/minio:latest
    container_name: doculens_v2_minio
    restart: unless-stopped
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9002"
    volumes:
      - minio_v2_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doculens_network

  api:
    build: .
    container_name: doculens_v2_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/doculens_v2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: doculens-v2
      MINIO_SECURE: "false"
      MODEL_PATH: best_model.pth
    volumes:
      - ./best_model.pth:/app/best_model.pth
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - doculens_network

networks:
  doculens_network:
    driver: bridge

volumes:
  postgres_v2_data:
  minio_v2_data: